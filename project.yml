# ============================================
# StarLink — XcodeGen Project Specification
# ============================================
# Generate the Xcode project:
#   brew install xcodegen
#   xcodegen generate
#   open StarLink.xcodeproj

name: StarLink

options:
  bundleIdPrefix: com.starlink
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# ── Settings (Project-Level) ──
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "UF7476MYJ6"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: "NO"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      GCC_PREPROCESSOR_DEFINITIONS:
        - "DEBUG=1"
        - "$(inherited)"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
      SWIFT_COMPILATION_MODE: "wholemodule"
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      VALIDATE_PRODUCT: "YES"
      GCC_OPTIMIZATION_LEVEL: "s"

# ── Packages (Swift Package Manager) ──
packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: "2.0.0"

# ── Targets ──
targets:
  StarLink:
    type: application
    platform: iOS
    sources:
      - path: StarLink
        excludes:
          - "**/.DS_Store"
    info:
      path: StarLink/Info.plist
      properties:
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "StarLink needs microphone access to capture ambient speech for real-time translation."
        NSBluetoothAlwaysUsageDescription: "StarLink uses Bluetooth to stream translated audio directly to your Starkey hearing aids."
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.godju.starlink.app
        INFOPLIST_FILE: StarLink/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: "NO"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: LiveKit
    # Background audio capability
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
          backgroundModes:
            - audio

  StarLinkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StarLinkTests
    dependencies:
      - target: StarLink
    settings:
      GENERATE_INFOPLIST_FILE: "YES"
